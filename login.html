<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - LX Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { gamer: { dark: '#0B0C10', gray: '#1F2833', lightgray: '#C5C6C7', cyan: '#66FCF1', teal: '#45A29E', red: '#FF4B4B' } } } } }
    </script>
    <style>body { font-family: 'Prompt', sans-serif; } .font-gaming { font-family: 'Prompt', sans-serif; font-weight: 700; }</style>
</head>
<body class="bg-gamer-dark text-gamer-lightgray min-h-screen flex flex-col">

    <!-- Nav -->
    <nav class="bg-gamer-gray/90 backdrop-blur-md border-b border-gamer-teal/30 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <a href="/" class="flex items-center gap-2 group">
                    <i class="fa-solid fa-microchip text-gamer-cyan text-3xl group-hover:rotate-12 transition-transform"></i>
                    <span class="font-gaming text-3xl font-bold text-white tracking-wider">LX<span class="text-gamer-cyan">SHOP</span></span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Login Form -->
    <section class="flex-grow flex items-center justify-center py-16 px-4 relative">
        <div class="absolute top-20 left-1/4 w-96 h-96 bg-gamer-cyan/5 rounded-full blur-[120px] pointer-events-none"></div>
        <div class="absolute bottom-20 right-1/4 w-96 h-96 bg-purple-500/5 rounded-full blur-[120px] pointer-events-none"></div>

        <div class="w-full max-w-md relative z-10">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-gamer-gray border border-gamer-cyan/30 rounded-2xl mb-4 shadow-[0_0_20px_rgba(102,252,241,0.15)]">
                    <i class="fa-solid fa-user-lock text-gamer-cyan text-3xl"></i>
                </div>
                <h1 class="font-gaming text-4xl font-bold text-white">เข้าสู่ระบบ</h1>
                <p class="text-gamer-lightgray/70 mt-2">เข้าสู่บัญชีของคุณเพื่อช้อปปิ้ง</p>
            </div>

            <form id="login-form" class="bg-gamer-gray/50 backdrop-blur-sm border border-gamer-teal/20 rounded-2xl p-8 shadow-xl">
                <div id="error-msg" class="hidden bg-gamer-red/10 border border-gamer-red/40 text-gamer-red text-sm p-3 rounded-xl mb-6 flex items-center gap-2">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span id="error-text"></span>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gamer-lightgray mb-2">อีเมล</label>
                    <div class="relative">
                        <i class="fa-solid fa-envelope absolute left-4 top-3.5 text-gamer-teal pointer-events-none"></i>
                        <input id="email" type="email" required placeholder="your@email.com"
                            class="w-full bg-gamer-dark text-white border border-gamer-teal/30 rounded-xl py-3 pl-12 pr-4 focus:outline-none focus:border-gamer-cyan focus:ring-1 focus:ring-gamer-cyan transition-all">
                    </div>
                </div>

                <div class="mb-6">
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-semibold text-gamer-lightgray">รหัสผ่าน</label>
                        <a href="javascript:void(0)" onclick="openForgotModal()" class="text-gamer-cyan text-xs hover:underline">ลืมรหัสผ่าน?</a>
                    </div>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-4 top-3.5 text-gamer-teal pointer-events-none"></i>
                        <input id="password" type="password" required placeholder="••••••••"
                            class="w-full bg-gamer-dark text-white border border-gamer-teal/30 rounded-xl py-3 pl-12 pr-4 focus:outline-none focus:border-gamer-cyan focus:ring-1 focus:ring-gamer-cyan transition-all">
                    </div>
                </div>

                <button type="submit" class="w-full bg-gamer-cyan text-gamer-dark font-bold py-3.5 rounded-xl hover:bg-white transition-all transform hover:-translate-y-0.5 hover:shadow-[0_0_20px_rgba(102,252,241,0.5)] tracking-wider flex items-center justify-center gap-2 text-lg">
                    <i class="fa-solid fa-right-to-bracket"></i> เข้าสู่ระบบ
                </button>

                <div class="mt-6 text-center text-sm">
                    <span class="text-gamer-lightgray/60">ยังไม่มีบัญชี?</span>
                    <a href="/register.html" class="text-gamer-cyan hover:text-white font-semibold ml-1 transition-colors">สมัครสมาชิก</a>
                </div>
            </form>
        </div>
    </section>

    <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('error-msg');
        errorDiv.classList.add('hidden');

        try {
            const res = await fetch('/api/users/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const json = await res.json();
            if (json.success) {
                localStorage.setItem('lx_token', json.token);
                localStorage.setItem('lx_user', JSON.stringify(json.data));
                // ถ้าเป็น admin ไปหน้า admin
                if (json.data.role === 'admin') {
                    window.location.href = '/admin.html';
                } else {
                    window.location.href = '/';
                }
            } else {
                errorDiv.classList.remove('hidden');
                document.getElementById('error-text').textContent = json.message;
            }
        } catch (err) {
            errorDiv.classList.remove('hidden');
            document.getElementById('error-text').textContent = 'เกิดข้อผิดพลาด กรุณาลองใหม่';
        }
    });

    // --- ระบบกู้คืนรหัสผ่านด้วยรหัส OTP (Forgot Password Logic) ---
    function openForgotModal() {
        document.getElementById('forgot-modal').classList.remove('hidden');
        document.getElementById('forgot-step-1').classList.remove('hidden');
        document.getElementById('forgot-step-2').classList.add('hidden');
        document.getElementById('forgot-email').value = '';
        document.getElementById('forgot-otp').value = '';
        document.getElementById('forgot-new-password').value = '';
    }

    function closeForgotModal() {
        document.getElementById('forgot-modal').classList.add('hidden');
    }

    async function requestOtp() {
        const email = document.getElementById('forgot-email').value.trim();
        if (!email) return alert('กรุณากรอกอีเมล');

        try {
            const res = await fetch('/api/users/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const json = await res.json();
            if (json.success) {
                alert('🎉 ส่งรหัส OTP เรียบร้อย!\n' + json.message);
                document.getElementById('forgot-step-1').classList.add('hidden');
                document.getElementById('forgot-step-2').classList.remove('hidden');
                document.getElementById('otp-sent-text').textContent = `รหัส OTP ถูกส่งไปที่ ${email} แล้ว กรุณาตรวจสอบอีเมลของคุณ (หรือหน้าจอรัน Node.js หลังบ้าน)`;
            } else {
                alert('❌ เกิดข้อผิดพลาด: ' + json.message);
            }
        } catch (err) {
            console.error(err);
            alert('เกิดข้อผิดพลาดในการขอ OTP');
        }
    }

    async function resetPassword() {
        const email = document.getElementById('forgot-email').value.trim();
        const otp = document.getElementById('forgot-otp').value.trim();
        const newPassword = document.getElementById('forgot-new-password').value;

        if (!otp || otp.length !== 6) return alert('กรุณากรอกรหัส OTP 6 หลัก');
        if (!newPassword || newPassword.length < 6) return alert('กรุณากรอกรหัสผ่านใหม่อย่างน้อย 6 ตัวอักษร');

        try {
            const res = await fetch('/api/users/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, otp, new_password: newPassword })
            });
            const json = await res.json();
            if (json.success) {
                alert('✅ ' + json.message);
                closeForgotModal();
            } else {
                alert('❌ เกิดข้อผิดพลาด: ' + json.message);
            }
        } catch (err) {
            console.error(err);
            alert('เกิดข้อผิดพลาดในการตั้งรหัสผ่านใหม่');
        }
    }
    </script>
    <!-- Forgot Password Modal -->
    <div id="forgot-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center px-4">
        <div class="bg-gamer-dark border border-gamer-teal/30 rounded-2xl w-full max-w-md p-6 relative">
            <button onclick="closeForgotModal()" class="absolute top-4 right-4 text-gamer-lightgray hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            
            <!-- Step 1: Request OTP -->
            <div id="forgot-step-1" class="space-y-4">
                <h3 class="font-gaming text-2xl font-bold text-white mb-2 flex items-center gap-2">
                    <i class="fa-solid fa-key text-gamer-cyan"></i> ลืมรหัสผ่าน?
                </h3>
                <p class="text-gamer-lightgray/70 text-sm">กรอกอีเมลของคุณเพื่อรับรหัส OTP สำหรับตั้งรหัสผ่านใหม่</p>
                <div>
                    <label class="block text-sm text-gamer-lightgray mb-2">อีเมลบัญชีของคุณ</label>
                    <input type="email" id="forgot-email" placeholder="your@email.com" class="w-full bg-gamer-gray text-white border border-gamer-teal/30 rounded-xl py-3 px-4 focus:outline-none focus:border-gamer-cyan transition-all">
                </div>
                <button onclick="requestOtp()" class="w-full bg-gamer-cyan text-gamer-dark font-bold py-3 rounded-xl hover:bg-white transition-all shadow-[0_0_15px_rgba(102,252,241,0.2)]">ขอรหัส OTP</button>
            </div>

            <!-- Step 2: Enter OTP & Reset Password -->
            <div id="forgot-step-2" class="space-y-4 hidden">
                <h3 class="font-gaming text-2xl font-bold text-white mb-2 flex items-center gap-2">
                    <i class="fa-solid fa-user-shield text-gamer-cyan"></i> ยืนยันรหัส OTP
                </h3>
                <p class="text-gamer-lightgray/70 text-sm" id="otp-sent-text"></p>
                <div>
                    <label class="block text-sm text-gamer-lightgray mb-2">รหัส OTP 6 หลัก</label>
                    <input type="text" id="forgot-otp" placeholder="123456" maxlength="6" class="w-full bg-gamer-gray text-white border border-gamer-teal/30 rounded-xl py-3 px-4 text-center font-bold tracking-[8px] text-lg focus:outline-none focus:border-gamer-cyan transition-all">
                </div>
                <div>
                    <label class="block text-sm text-gamer-lightgray mb-2">รหัสผ่านใหม่ *</label>
                    <input type="password" id="forgot-new-password" placeholder="อย่างน้อย 6 ตัวอักษร" minlength="6" class="w-full bg-gamer-gray text-white border border-gamer-teal/30 rounded-xl py-3 px-4 focus:outline-none focus:border-gamer-cyan transition-all">
                </div>
                <button onclick="resetPassword()" class="w-full bg-gamer-cyan text-gamer-dark font-bold py-3 rounded-xl hover:bg-white transition-all shadow-[0_0_15px_rgba(102,252,241,0.2)]">เปลี่ยนรหัสผ่าน</button>
            </div>
        </div>
    </div>

<script src="/mobile-nav.js"></script>
<script src="/audio.js"></script>
</body>
</html>
