<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - LX Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { gamer: { dark: '#0B0C10', gray: '#1F2833', lightgray: '#C5C6C7', cyan: '#66FCF1', teal: '#45A29E', red: '#FF4B4B' } } } } }
    </script>
    <style>body { font-family: 'Prompt', sans-serif; } .font-gaming { font-family: 'Prompt', sans-serif; font-weight: 700; }</style>
</head>
<body class="bg-gamer-dark text-gamer-lightgray min-h-screen flex flex-col">

    <!-- Nav -->
    <nav class="bg-gamer-gray/90 backdrop-blur-md border-b border-gamer-teal/30 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <a href="/" class="flex items-center gap-2 group">
                    <i class="fa-solid fa-microchip text-gamer-cyan text-3xl group-hover:rotate-12 transition-transform"></i>
                    <span class="font-gaming text-3xl font-bold text-white tracking-wider">LX<span class="text-gamer-cyan">SHOP</span></span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Register Form -->
    <section class="flex-grow flex items-center justify-center py-16 px-4 relative">
        <div class="absolute top-20 right-1/4 w-96 h-96 bg-purple-500/5 rounded-full blur-[120px] pointer-events-none"></div>

        <div class="w-full max-w-md relative z-10">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-gamer-gray border border-gamer-cyan/30 rounded-2xl mb-4 shadow-[0_0_20px_rgba(102,252,241,0.15)]">
                    <i class="fa-solid fa-user-plus text-gamer-cyan text-3xl"></i>
                </div>
                <h1 class="font-gaming text-4xl font-bold text-white">สมัครสมาชิก</h1>
                <p class="text-gamer-lightgray/70 mt-2">สร้างบัญชีใหม่เพื่อเริ่มช้อปปิ้ง</p>
            </div>

            <form id="register-form" class="bg-gamer-gray/50 backdrop-blur-sm border border-gamer-teal/20 rounded-2xl p-8 shadow-xl">
                <div id="error-msg" class="hidden bg-gamer-red/10 border border-gamer-red/40 text-gamer-red text-sm p-3 rounded-xl mb-6 flex items-center gap-2">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span id="error-text"></span>
                </div>
                <div id="success-msg" class="hidden bg-green-500/10 border border-green-500/40 text-green-400 text-sm p-3 rounded-xl mb-6 flex items-center gap-2">
                    <i class="fa-solid fa-check-circle"></i>
                    <span>สมัครสมาชิกสำเร็จ! กำลังเข้าสู่ระบบ...</span>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-semibold text-gamer-lightgray mb-2">ชื่อ</label>
                        <input id="first_name" type="text" required placeholder="ชื่อ"
                            class="w-full bg-gamer-dark text-white border border-gamer-teal/30 rounded-xl py-3 px-4 focus:outline-none focus:border-gamer-cyan focus:ring-1 focus:ring-gamer-cyan transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gamer-lightgray mb-2">นามสกุล</label>
                        <input id="last_name" type="text" required placeholder="นามสกุล"
                            class="w-full bg-gamer-dark text-white border border-gamer-teal/30 rounded-xl py-3 px-4 focus:outline-none focus:border-gamer-cyan focus:ring-1 focus:ring-gamer-cyan transition-all">
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gamer-lightgray mb-2">อีเมล</label>
                    <div class="relative">
                        <i class="fa-solid fa-envelope absolute left-4 top-3.5 text-gamer-teal"></i>
                        <input id="email" type="email" required placeholder="your@email.com"
                            class="w-full bg-gamer-dark text-white border border-gamer-teal/30 rounded-xl py-3 pl-12 pr-4 focus:outline-none focus:border-gamer-cyan focus:ring-1 focus:ring-gamer-cyan transition-all">
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gamer-lightgray mb-2">เบอร์โทรศัพท์</label>
                    <div class="relative">
                        <i class="fa-solid fa-phone absolute left-4 top-3.5 text-gamer-teal"></i>
                        <input id="phone" type="tel" placeholder="0812345678"
                            class="w-full bg-gamer-dark text-white border border-gamer-teal/30 rounded-xl py-3 pl-12 pr-4 focus:outline-none focus:border-gamer-cyan focus:ring-1 focus:ring-gamer-cyan transition-all">
                    </div>
                </div>

                <div class="mb-8">
                    <label class="block text-sm font-semibold text-gamer-lightgray mb-2">รหัสผ่าน</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-4 top-3.5 text-gamer-teal"></i>
                        <input id="password" type="password" required placeholder="••••••••" minlength="6"
                            class="w-full bg-gamer-dark text-white border border-gamer-teal/30 rounded-xl py-3 pl-12 pr-4 focus:outline-none focus:border-gamer-cyan focus:ring-1 focus:ring-gamer-cyan transition-all">
                    </div>
                </div>

                <button type="submit" class="w-full bg-gamer-cyan text-gamer-dark font-bold py-3.5 rounded-xl hover:bg-white transition-all transform hover:-translate-y-0.5 hover:shadow-[0_0_20px_rgba(102,252,241,0.5)] tracking-wider flex items-center justify-center gap-2 text-lg">
                    <i class="fa-solid fa-user-plus"></i> สมัครสมาชิก
                </button>

                <div class="mt-6 text-center text-sm">
                    <span class="text-gamer-lightgray/60">มีบัญชีแล้ว?</span>
                    <a href="/login.html" class="text-gamer-cyan hover:text-white font-semibold ml-1 transition-colors">เข้าสู่ระบบ</a>
                </div>
            </form>
        </div>
    </section>

    <script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorDiv = document.getElementById('error-msg');
        const successDiv = document.getElementById('success-msg');
        errorDiv.classList.add('hidden');
        successDiv.classList.add('hidden');

        const body = {
            first_name: document.getElementById('first_name').value,
            last_name: document.getElementById('last_name').value,
            email: document.getElementById('email').value,
            phone_number: document.getElementById('phone').value,
            password: document.getElementById('password').value
        };

        try {
            const res = await fetch('/api/users/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const json = await res.json();
            if (json.success) {
                successDiv.classList.remove('hidden');
                localStorage.setItem('lx_token', json.token);
                localStorage.setItem('lx_user', JSON.stringify(json.data));
                setTimeout(() => { window.location.href = '/'; }, 1500);
            } else {
                errorDiv.classList.remove('hidden');
                document.getElementById('error-text').textContent = json.message;
            }
        } catch (err) {
            errorDiv.classList.remove('hidden');
            document.getElementById('error-text').textContent = 'เกิดข้อผิดพลาด กรุณาลองใหม่';
        }
    });
    </script>
</body>
</html>
